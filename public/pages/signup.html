<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>

  <link rel="stylesheet" href="../css/style.css"/>

<body class="auth-body">
  <nav class="nav" style="position:relative;background:rgba(0,0,0,.5);backdrop-filter:blur(8px)">
    <a href="../index.html" class="logo"><span class="logo-v">VID</span><span class="logo-n">NOVA</span></a>
  </nav>
  <main class="auth-main">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-sub">Join VidNova today. Cancel anytime.</p>
      <div class="fg"><label>Full Name</label><input type="text" id="name" placeholder="Your full name"/><div class="err" id="nameErr">Please enter your name.</div></div>
      <div class="fg"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com"/><div class="err" id="emailErr">Enter a valid email.</div></div>
      <div class="fg"><label>Password</label>
        <div class="ii"><input type="password" id="pass" placeholder="Min. 8 characters" oninput="strength(this.value)"/><i class="fas fa-eye" onclick="tog('pass',this)"></i></div>
        <div class="str-bar"><div class="str-fill" id="strFill"></div></div>
        <div class="err" id="passErr">Minimum 8 characters.</div>
      </div>
      <div class="fg"><label>Confirm Password</label>
        <div class="ii"><input type="password" id="conf" placeholder="Repeat password"/><i class="fas fa-eye" onclick="tog('conf',this)"></i></div>
        <div class="err" id="confErr">Passwords don't match.</div>
      </div>
      <div class="chk-row"><input type="checkbox" id="terms"/><label for="terms">I agree to the <a href="#" style="color:var(--accent)">Terms</a> &amp; <a href="#" style="color:var(--accent)">Privacy Policy</a></label></div>
      <div class="err" id="termsErr" style="display:none;margin-bottom:10px">Please accept the terms.</div>
      <button class="btn-main" onclick="signup()" id="btn">Create Account</button>
      <div class="or-div">or</div>
      <button class="btn-google" onclick="googleSignup()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3L37.4 9.5C34 6.4 29.2 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.8 18.9 12 24 12c3.1 0 5.8 1.1 7.9 3L37.4 9.5C34 6.4 29.2 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.4-5l-6.2-5.2C29.3 35.5 26.8 36 24 36c-5.2 0-9.6-3.2-11.3-7.8l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.2-2.3 4.1-4.2 5.4l6.2 5.2C40.7 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-3.9z"/></svg>

  <script>
    window.onload=()=>{
      const e=sessionStorage.getItem('signupEmail'); if(e) document.getElementById('email').value=e;
    };
    function tog(id,icon){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';icon.className=i.type==='password'?'fas fa-eye':'fas fa-eye-slash';}
    function strength(v){const f=document.getElementById('strFill');let s=0;if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/\d/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;f.style.width=(s/4*100)+'%';f.style.background=s<=1?'#e50914':s<=2?'#ff9800':s<=3?'#ffc107':'#4caf50';}
    function show(id,v){document.getElementById(id).style.display=v?'block':'none';}
    async function signup(){
      async function signup() {
  const name  = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;

  if (!name || !email || pass.length < 8) return;

  try {
    const btn = document.getElementById('btn');
    btn.textContent = 'Creating...'; btn.disabled = true;

    // Create user in Firebase
    const cred = await window.firebaseCreateUser(window.firebaseAuth, email, pass);

    // Also save to your Node.js server
    await fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password: pass }),
      credentials: 'include'
    });

    window.location.href = 'plan-select.html';
  } catch(e) {
    if (e.code === 'auth/email-already-in-use') alert('Email already registered.');
    else if (e.code === 'auth/weak-password') alert('Password too weak.');
    else alert(e.message);
    btn.textContent = 'Create Account'; btn.disabled = false;
  }
}
    function googleSignup(){ window.location.href='signin.html'; }
  </script>
</body>
