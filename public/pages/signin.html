<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>VidNova – Sign In</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>body{background:url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1400') center/cover no-repeat fixed;}</style>
</head>
<body class="auth-body">
  <div style="position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(2px)"></div>
  <nav class="nav" style="position:fixed;background:rgba(0,0,0,.5);backdrop-filter:blur(8px)">
    <a href="../index.html" class="logo"><span class="logo-v">VID</span><span class="logo-n">NOVA</span></a>
  </nav>
  <main class="auth-main" style="position:relative;z-index:2">
    <div class="auth-card">
      <h2>Sign In</h2>
      <p class="auth-sub">Welcome back! Continue watching.</p>
      <div class="err" id="topErr" style="display:none;margin-bottom:14px;padding:10px;background:rgba(229,9,20,.1);border-radius:6px;border-left:3px solid var(--accent)"></div>
      <div class="fg"><label>Email</label><input type="email" id="email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')signin()"/></div>
      <div class="fg"><label>Password</label>
        <div class="ii"><input type="password" id="pass" placeholder="Password" onkeydown="if(event.key==='Enter')signin()"/><i class="fas fa-eye" onclick="tog('pass',this)"></i></div>
      </div>
      <div style="text-align:right;margin-bottom:18px"><a href="forgot-password.html" style="color:var(--muted);font-size:.82rem">Forgot password?</a></div>
      <button class="btn-main" onclick="signin()" id="btn"><i class="fas fa-lock" style="margin-right:6px"></i>Sign In</button>
      <div class="or-div">or</div>
      <button class="btn-google" onclick="googleSignin()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3L37.4 9.5C34 6.4 29.2 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.8 18.9 12 24 12c3.1 0 5.8 1.1 7.9 3L37.4 9.5C34 6.4 29.2 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.4-5l-6.2-5.2C29.3 35.5 26.8 36 24 36c-5.2 0-9.6-3.2-11.3-7.8l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.2-2.3 4.1-4.2 5.4l6.2 5.2C40.7 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-3.9z"/></svg>
        Continue with Google
      </button>
      <p class="auth-bot" style="margin-top:18px">New to VidNova? <a href="signup.html">Sign up now</a></p>
      <p style="text-align:center;margin-top:10px;font-size:.75rem;color:var(--muted)"><i class="fas fa-lock" style="margin-right:4px"></i>Protected by Firebase Auth</p>
    </div>
  </main>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAnalytics }                         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
                                                    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBpBjkp1x5zjXz1J5idSueBk2ZWCvRnvSo",
      authDomain:        "vidnova-striming.firebaseapp.com",
      projectId:         "vidnova-striming",
      storageBucket:     "vidnova-striming.firebasestorage.app",
      messagingSenderId: "637437974202",
      appId:             "1:637437974202:web:8d9869b82c13dcb7ef9483",
      measurementId:     "G-HF9KL8215Q"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    getAnalytics(firebaseApp);
    const auth     = getAuth(firebaseApp);
    const provider = new GoogleAuthProvider();

    window._fbAuth            = auth;
    window._fbSignIn          = signInWithEmailAndPassword;
    window._fbGoogleProvider  = provider;
    window._fbSignInWithPopup = signInWithPopup;
    window._fbReady           = true;

    // If Firebase already has a logged-in user, sync with server
    onAuthStateChanged(auth, async (fbUser) => {
      if (fbUser) {
        try {
          const r = await fetch('/api/me', { credentials: 'include' });
          if (r.ok) {
            const d = await r.json();
            sessionStorage.setItem('vnUser', JSON.stringify(d.user));
            window.location.href = d.user.plan ? 'home.html' : 'plan-select.html';
          }
        } catch(e) {}
      }
    });
  </script>

  <script>
    function tog(id, icon) {
      const i = document.getElementById(id);
      i.type = i.type === 'password' ? 'text' : 'password';
      icon.className = i.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    }

    function showErr(msg) {
      const e = document.getElementById('topErr');
      e.textContent = msg; e.style.display = 'block';
    }

    async function signin() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('pass').value;
      if (!email || !pass) { showErr('Email and password required.'); return; }

      const btn = document.getElementById('btn');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
      btn.disabled = true;

      // Wait for Firebase
      let waited = 0;
      while (!window._fbReady && waited < 5000) { await new Promise(r => setTimeout(r, 100)); waited += 100; }

      try {
        // 1. Sign in with Firebase
        await window._fbSignIn(window._fbAuth, email, pass);

        // 2. Sign in to Node.js server for session
        const r = await fetch('/api/signin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass }),
          credentials: 'include'
        });
        const d = await r.json();

        if (d.success) {
          sessionStorage.setItem('vnUser', JSON.stringify(d.user));
          window.location.href = d.user.plan ? 'home.html' : 'plan-select.html';
        } else {
          throw new Error(d.error || 'Server sign in failed');
        }

      } catch (e) {
        let msg = e.message;
        if (e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential')
          msg = 'Invalid email or password.';
        else if (e.code === 'auth/too-many-requests')
          msg = 'Too many attempts. Please try again later.';
        else if (e.code === 'auth/invalid-email')
          msg = 'Invalid email address.';
        showErr(msg);
        btn.innerHTML = '<i class="fas fa-lock" style="margin-right:6px"></i>Sign In';
        btn.disabled = false;
      }
    }

    async function googleSignin() {
      let waited = 0;
      while (!window._fbReady && waited < 5000) { await new Promise(r => setTimeout(r, 100)); waited += 100; }

      try {
        const result = await window._fbSignInWithPopup(window._fbAuth, window._fbGoogleProvider);
        const user   = result.user;

        // Register on server if new user
        await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: user.displayName || 'Google User', email: user.email, password: user.uid }),
          credentials: 'include'
        });

        // Sign in to server session
        const r = await fetch('/api/signin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: user.email, password: user.uid }),
          credentials: 'include'
        });
        const d = await r.json();
        sessionStorage.setItem('vnUser', JSON.stringify(d.user || { name: user.displayName, email: user.email }));
        window.location.href = d.user?.plan ? 'home.html' : 'plan-select.html';

      } catch (e) {
        if (e.code !== 'auth/popup-closed-by-user') showErr(e.message);
      }
    }
  </script>
</body>
</html>
